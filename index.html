<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chip Rack Counter — AI Inventory Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --ink:     #0f0f0d;
        --ink2:    #5a5a52;
        --ink3:    #9a9a90;
        --paper:   #f8f7f2;
        --paper2:  #eeecea;
        --paper3:  #e4e2dd;
        --accent:  #e8400a;
        --border:  rgba(15,15,13,.10);
        --border2: rgba(15,15,13,.18);
        --r:  6px;
        --rl: 12px;
        --shadow: 0 2px 16px rgba(0,0,0,.07);
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--paper);
        color: var(--ink);
        min-height: 100vh;
        padding: 2.5rem 1rem 5rem;
      }
      .wrap { max-width: 800px; margin: 0 auto; }
      .header-tag {
        display: inline-block;
        font-family: "DM Mono", monospace;
        font-size: 10px; font-weight: 500;
        letter-spacing: .12em; text-transform: uppercase;
        color: var(--accent); border: 1px solid var(--accent);
        border-radius: 3px; padding: 2px 7px; margin-bottom: 10px;
      }
      h1 { font-size: 28px; font-weight: 600; letter-spacing: -.02em; }
      .sub { font-size: 14px; color: var(--ink2); margin-top: 6px; line-height: 1.6; max-width: 560px; }

      /* Steps */
      .step { display: none; }
      .step.active { display: block; }

      /* Setup Cards */
      .card {
        background: white;
        border: 1px solid var(--border);
        border-radius: var(--rl);
        padding: 1.5rem;
        margin-top: 1.5rem;
        box-shadow: var(--shadow);
      }
      .field { margin-bottom: 1.25rem; }
      .field label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--ink2);
        margin-bottom: 6px;
        font-family: "DM Mono", monospace;
      }
      input[type="number"], input[type="text"] {
        width: 100%;
        padding: 12px;
        border-radius: var(--r);
        border: 1.5px solid var(--border2);
        font-family: inherit;
        font-size: 16px;
      }

      /* Upload Slots */
      .rack-group {
        border-top: 1px solid var(--border);
        padding-top: 1.5rem;
        margin-top: 1.5rem;
      }
      .rack-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 1rem;
      }
      .upload-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      @media (max-width: 600px) { .upload-grid { grid-template-columns: 1fr; } }

      .drop {
        border: 1.5px dashed var(--border2);
        border-radius: var(--rl);
        background: var(--paper);
        position: relative; overflow: hidden; cursor: pointer;
        min-height: 120px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: background .15s;
      }
      .drop:hover { background: var(--paper2); }
      .drop.has { border-style: solid; background: white; }
      .drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
      .drop-hint { text-align: center; pointer-events: none; padding: 1rem; }
      .drop-lbl { font-size: 13px; font-weight: 500; }
      .drop-sub { font-size: 11px; color: var(--ink3); }
      .preview-img { width: 100%; height: 120px; object-fit: cover; display: none; }

      /* Buttons */
      .btn-row { display: flex; gap: 10px; margin-top: 2rem; }
      .btn {
        padding: 12px 24px; font-size: 14px; font-weight: 600;
        border-radius: var(--r); cursor: pointer;
        border: 1.5px solid var(--border2); background: white;
        transition: all .15s;
      }
      .btn.pri { background: var(--ink); color: white; border-color: var(--ink); }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      /* Results */
      .res-summary {
        background: var(--ink);
        color: white;
        padding: 2rem;
        border-radius: var(--rl);
        text-align: center;
        margin-top: 2rem;
      }
      .res-total { font-size: 48px; font-weight: 700; }
      .res-label { font-size: 12px; text-transform: uppercase; color: var(--ink3); letter-spacing: 1px; }

      .chip-list { margin-top: 2rem; }
      .chip-item {
        display: flex; align-items: center; justify-content: space-between;
        padding: 1rem;
        border-bottom: 1px solid var(--border);
      }
      .chip-name { font-weight: 600; }
      .chip-count { font-family: "DM Mono", monospace; font-weight: 600; }

      .status-box {
        margin-top: 1rem;
        font-family: "DM Mono", monospace;
        font-size: 12px;
        color: var(--ink2);
      }
      .spin {
        display: inline-block; width: 12px; height: 12px;
        border: 2px solid var(--border2); border-top-color: var(--ink);
        border-radius: 50%; animation: spin .7s linear infinite;
        margin-right: 8px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header-tag">AI Inventory Assistant</div>
      <h1>Chip Inventory System</h1>
      <p class="sub">Complete the steps below to calculate your total inventory across all racks.</p>

      <!-- Step 1: Configuration -->
      <div id="step1" class="step active">
        <div class="card">
          <div class="field">
            <label>How many racks do you have?</label>
            <input type="number" id="rackCount" value="1" min="1" max="10" />
          </div>
          <div class="field">
            <label>Chips deep per slot (Stack depth)</label>
            <input type="number" id="stackDepth" value="4" min="1" max="20" />
          </div>
          <button class="btn pri" onclick="goToStep2()">Continue to Uploads</button>
        </div>
      </div>

      <!-- Step 2: Uploads -->
      <div id="step2" class="step">
        <div id="uploadContainer"></div>
        <div class="btn-row">
          <button class="btn" onclick="goToStep1()">Back</button>
          <button class="btn pri" id="analyzeBtn" onclick="runAnalysis()">Start Analysis</button>
        </div>
        <div id="statusEl" class="status-box"></div>
      </div>

      <!-- Step 3: Results -->
      <div id="step3" class="step">
        <div class="res-summary">
          <div class="res-label">Total Inventory Count</div>
          <div class="res-total" id="grandTotal">0</div>
          <div class="res-label">Bags in Stock</div>
        </div>
        <div class="chip-list" id="finalCounts"></div>
        <button class="btn" onclick="goToStep1()" style="margin-top: 2rem">Start New Count</button>
      </div>
    </div>

    <script>
      let config = { racks: 1, depth: 4 };
      let files = {}; // key: "rackX_side", value: File

      function goToStep1() {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step1').classList.add('active');
      }

      function goToStep2() {
        config.racks = parseInt(document.getElementById('rackCount').value);
        config.depth = parseInt(document.getElementById('stackDepth').value);
        
        const container = document.getElementById('uploadContainer');
        container.innerHTML = '';
        files = {};

        for (let i = 1; i <= config.racks; i++) {
          const section = document.createElement('div');
          section.className = 'rack-group';
          section.innerHTML = `
            <div class="rack-title">Rack ${i}</div>
            <div class="upload-grid">
              <div class="drop" id="rack${i}_front_drop">
                <input type="file" onchange="handleFile(this, 'rack${i}_front')" accept="image/*">
                <div class="drop-hint">
                  <div class="drop-lbl">Front View</div>
                  <div class="drop-sub">Click to upload</div>
                </div>
                <img class="preview-img" id="rack${i}_front_preview">
              </div>
              <div class="drop" id="rack${i}_back_drop">
                <input type="file" onchange="handleFile(this, 'rack${i}_back')" accept="image/*">
                <div class="drop-hint">
                  <div class="drop-lbl">Back View</div>
                  <div class="drop-sub">Click to upload</div>
                </div>
                <img class="preview-img" id="rack${i}_back_preview">
              </div>
            </div>
          `;
          container.appendChild(section);
        }

        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step2').classList.add('active');
      }

      function handleFile(input, key) {
        const file = input.files[0];
        if (!file) return;
        files[key] = file;
        
        const drop = input.parentElement;
        const preview = document.getElementById(key + '_preview');
        const hint = drop.querySelector('.drop-hint');
        
        const reader = new FileReader();
        reader.onload = e => {
          preview.src = e.target.result;
          preview.style.display = 'block';
          hint.style.display = 'none';
          drop.classList.add('has');
        };
        reader.readAsDataURL(file);
      }

      async function runAnalysis() {
        const btn = document.getElementById('analyzeBtn');
        const status = document.getElementById('statusEl');
        btn.disabled = true;
        
        let totalAggregate = 0;
        let chipTotals = {};

        const fileKeys = Object.keys(files);
        if (fileKeys.length === 0) {
          alert("Please upload at least one image.");
          btn.disabled = false;
          return;
        }

        for (let i = 0; i < fileKeys.length; i++) {
          const key = fileKeys[i];
          status.innerHTML = `<span class="spin"></span> Analyzing ${key.replace('_', ' ')} (${i+1}/${fileKeys.length})...`;
          
          const fd = new FormData();
          fd.append('image', files[key]);
          fd.append('threshold', 0.65);

          try {
            const res = await fetch('/detect', { method: 'POST', body: fd });
            const data = await res.json();
            
            if (data.ok) {
              // Visible bags in this photo * stack depth
              Object.entries(data.counts).forEach(([name, count]) => {
                const weighted = count * config.depth;
                chipTotals[name] = (chipTotals[name] || 0) + weighted;
                totalAggregate += weighted;
              });
            }
          } catch (e) {
            console.error("Error analyzing " + key, e);
          }
        }

        renderResults(totalAggregate, chipTotals);
        btn.disabled = false;
        status.innerHTML = '';
      }

      function renderResults(total, counts) {
        document.getElementById('grandTotal').textContent = total;
        const list = document.getElementById('finalCounts');
        list.innerHTML = '';

        Object.entries(counts).sort((a,b) => b[1] - a[1]).forEach(([name, count]) => {
          const item = document.createElement('div');
          item.className = 'chip-item';
          item.innerHTML = `
            <div class="chip-name">${name}</div>
            <div class="chip-count">${count}</div>
          `;
          list.appendChild(item);
        });

        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step3').classList.add('active');
      }
    </script>
  </body>
</html>
